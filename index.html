<!DOCTYPE html>
<html lang="zh-HK" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Workie - Soft UI Tracker</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase V8 Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#FF8E8E',
                            DEFAULT: '#FF6B6B', // Creamy Red
                            dark: '#E55A5A',
                        },
                        bg: {
                            light: '#FDFBF7', // Warm Cream
                            dark: '#1A1B1E',  // Soft Dark
                        },
                        text: {
                            main: '#4A4A4A',
                            muted: '#9CA3AF',
                            darkMain: '#E5E7EB',
                        },
                        aux: {
                            mint: '#7BC67E',     // Success/Income
                            lavender: '#A5B4FC', // Neutral/Info
                            peach: '#FFB347',    // Warning/Pending
                        }
                    },
                    boxShadow: {
                        // Dual-Shadow Neumorphism (Soft UI)
                        'neu-light': '-5px -5px 15px rgba(255, 255, 255, 0.8), 5px 5px 15px rgba(0, 0, 0, 0.05)',
                        'neu-dark': '-5px -5px 15px rgba(255, 255, 255, 0.02), 5px 5px 15px rgba(0, 0, 0, 0.3)',
                        'neu-inset-light': 'inset 4px 4px 8px rgba(0, 0, 0, 0.04), inset -4px -4px 8px rgba(255, 255, 255, 0.9)',
                        'neu-inset-dark': 'inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.02)',
                        'brand-glow': '0 4px 15px rgba(255, 107, 107, 0.4)',
                    },
                    animation: {
                        shimmer: 'shimmer 2s infinite',
                        pulse_fast: 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for Soft UI & Animations -->
    <style type="text/tailwindcss">
        @layer utilities {
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            
            /* Card-Push Animation */
            .card-push-enter {
                animation: cardPush 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            }
            @keyframes cardPush {
                0% { opacity: 0; transform: translateX(30px) scale(0.98); }
                100% { opacity: 1; transform: translateX(0) scale(1); }
            }
        }

        @layer components {
            /* Neumorphic Card: Matches background, dual shadow, overflow visible to prevent clipping */
            .neu-card {
                @apply bg-bg-light dark:bg-bg-dark shadow-neu-light dark:shadow-neu-dark rounded-3xl transition-all duration-500 overflow-visible border border-white/40 dark:border-white/5;
            }
            
            /* Primary Action Button */
            .neu-btn-primary {
                @apply bg-brand text-white font-bold rounded-2xl shadow-brand-glow hover:opacity-90 active:scale-[0.97] transition-all duration-200 flex items-center justify-center;
            }

            /* Standard Neumorphic Button (Pressable) */
            .neu-btn {
                @apply bg-bg-light dark:bg-bg-dark text-text-main dark:text-text-darkMain font-bold rounded-xl shadow-neu-light dark:shadow-neu-dark active:shadow-neu-inset-light dark:active:shadow-neu-inset-dark active:scale-[0.98] transition-all duration-200;
            }

            /* Inputs & Inset Areas */
            .neu-inset {
                @apply bg-bg-light dark:bg-bg-dark shadow-neu-inset-light dark:shadow-neu-inset-dark rounded-2xl border border-transparent dark:border-white/5;
            }
            .neu-input {
                @apply w-full bg-bg-light dark:bg-bg-dark shadow-neu-inset-light dark:shadow-neu-inset-dark rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-brand/30 text-text-main dark:text-text-darkMain transition-all duration-300 text-sm;
            }

            /* Bottom Nav Tab */
            .nav-tab {
                @apply flex flex-col items-center justify-center w-12 h-12 rounded-2xl transition-all duration-300 text-text-muted;
            }
            .nav-tab.active {
                @apply text-brand shadow-neu-inset-light dark:shadow-neu-inset-dark bg-bg-light dark:bg-bg-dark;
            }
        }

        body { 
            /* Prevent horizontal scroll and add padding for bottom nav */
            overflow-x: hidden;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
            transition: background-color 0.5s ease, color 0.5s ease; 
        }
    </style>
</head>
<body class="min-h-screen bg-bg-light text-text-main dark:bg-bg-dark dark:text-text-darkMain selection:bg-brand/30">

    <!-- 頂部狀態列 (Sync Status & Theme) -->
    <div class="fixed top-0 left-0 w-full z-40 bg-bg-light/80 dark:bg-bg-dark/80 backdrop-blur-md pt-[env(safe-area-inset-top)]">
        <div class="max-w-4xl mx-auto px-4 py-2 flex justify-between items-center">
            <div id="sync-badge" class="flex items-center gap-1.5 px-3 py-1 rounded-full shadow-neu-inset-light dark:shadow-neu-inset-dark transition-all duration-500 opacity-0 transform scale-90">
                <span id="sync-dot" class="w-2 h-2 rounded-full bg-aux-peach"></span>
                <span id="sync-text" class="text-[10px] font-bold text-text-muted whitespace-nowrap">連線中</span>
            </div>
            <button id="theme-toggle" class="p-2 rounded-full shadow-neu-light dark:shadow-neu-dark text-text-muted hover:text-brand transition-colors">
                <i data-lucide="moon" class="w-4 h-4" id="theme-icon"></i>
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 pt-14 space-y-5">
        
        <!-- ================= 主頁 (Dashboard) ================= -->
        <div id="view-dashboard" class="view-section space-y-5 card-push-enter">
            
            <!-- 總目標進度卡片 (Compact) -->
            <div class="neu-card p-5">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h2 class="text-xs font-bold text-text-muted mb-1">總目標進度</h2>
                        <div class="flex items-baseline gap-2">
                            <p id="dash-current-total" class="text-3xl font-extrabold tracking-tight text-text-main dark:text-text-darkMain">$0</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p id="dash-earned-total" class="text-sm font-bold text-aux-mint mb-0.5">(+$0)</p>
                        <p id="dash-remaining-text" class="text-xs font-bold text-brand">尚欠: $0</p>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-bold text-text-muted">
                        <span id="dash-progress-text">0%</span>
                        <span id="dash-goal-text">目標: $100,000</span>
                    </div>
                    <div class="neu-inset h-3 overflow-hidden p-0.5">
                        <div id="dash-progress-bar" class="bg-brand h-full rounded-full transition-all duration-1000 ease-out relative shadow-brand-glow" style="width: 0%">
                            <div class="absolute inset-0 bg-white/20 w-full animate-shimmer"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 新增記錄表單 (Compact) -->
            <div class="neu-card p-5">
                <h2 class="text-sm font-bold mb-4 flex items-center gap-2 text-text-main dark:text-text-darkMain">
                    <div class="p-1.5 rounded-lg shadow-neu-light dark:shadow-neu-dark text-brand"><i data-lucide="plus" class="w-4 h-4"></i></div>
                    新增今日記錄
                </h2>
                <form id="record-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">日期</label>
                            <input type="date" id="record-date" class="neu-input" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">時長 (hr)</label>
                            <div class="flex items-center gap-2">
                                <button type="button" id="btn-duration-minus" class="neu-btn p-2"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                <div class="flex-1 text-center neu-inset py-2 text-sm font-bold text-text-main dark:text-text-darkMain">
                                    <span id="record-duration">1.5</span>
                                </div>
                                <button type="button" id="btn-duration-plus" class="neu-btn p-2"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">學生 / 來源</label>
                        <select id="record-source" class="neu-input appearance-none" required>
                            <option value="" disabled selected>請選擇學生...</option>
                        </select>
                    </div>
                    
                    <div id="record-preview" class="hidden p-3 neu-inset flex justify-between items-center">
                        <span class="text-xs font-bold text-text-muted">預計收入</span>
                        <span id="record-preview-amount" class="text-base font-extrabold text-aux-mint">$0</span>
                    </div>

                    <button type="submit" class="w-full neu-btn-primary py-3 text-sm">儲存記錄</button>
                </form>
            </div>

            <!-- 圖表 (Bar / Line Chart) -->
            <div class="neu-card p-5">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-sm flex items-center gap-2">
                        <div class="p-1.5 rounded-lg shadow-neu-light dark:shadow-neu-dark text-aux-lavender"><i data-lucide="bar-chart-2" class="w-4 h-4"></i></div>
                        收入趨勢
                    </h3>
                    <div class="flex neu-inset p-1">
                        <button id="chart-type-weekly" class="px-3 py-1 text-[10px] font-bold rounded-lg shadow-neu-light dark:shadow-neu-dark text-brand bg-bg-light dark:bg-bg-dark transition-all">單週</button>
                        <button id="chart-type-cumulative" class="px-3 py-1 text-[10px] font-bold rounded-lg text-text-muted transition-all">累積</button>
                    </div>
                </div>
                <!-- 時間段切換 -->
                <div class="flex gap-2 mb-4" id="chart-period-container">
                    <button class="chart-period-btn flex-1 neu-btn py-1.5 text-[10px] text-brand shadow-neu-inset-light dark:shadow-neu-inset-dark bg-bg-light dark:bg-bg-dark transition-all" data-days="28">4週</button>
                    <button class="chart-period-btn flex-1 neu-btn py-1.5 text-[10px] transition-all" data-days="56">8週</button>
                    <button class="chart-period-btn flex-1 neu-btn py-1.5 text-[10px] transition-all" data-days="180">半年</button>
                    <button class="chart-period-btn flex-1 neu-btn py-1.5 text-[10px] transition-all" data-days="365">1年</button>
                </div>
                <div class="h-48 w-full relative">
                    <canvas id="incomeChart"></canvas>
                </div>
            </div>

            <!-- 最近記錄 -->
            <div class="neu-card p-5">
                <h3 class="font-bold text-sm mb-3 flex items-center gap-2">
                    <div class="p-1.5 rounded-lg shadow-neu-light dark:shadow-neu-dark text-text-muted"><i data-lucide="clock" class="w-4 h-4"></i></div>
                    最近記錄
                </h3>
                <div class="space-y-2" id="recent-records-body">
                    <!-- Records injected here -->
                </div>
            </div>
        </div>

        <!-- ================= 月曆 (Calendar) ================= -->
        <div id="view-calendar" class="view-section space-y-5 hidden">
            <div class="neu-card p-4 md:p-6">
                <div class="flex items-center justify-between mb-6">
                    <button id="cal-prev" class="neu-btn p-2"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    <div class="text-center">
                        <h2 id="cal-month-title" class="text-lg font-extrabold tracking-tight text-text-main dark:text-text-darkMain"></h2>
                        <p class="text-xs font-bold text-aux-mint mt-1" id="cal-month-total">$0</p>
                    </div>
                    <button id="cal-next" class="neu-btn p-2"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                </div>
                
                <div class="w-full">
                    <div class="grid grid-cols-7 gap-1 md:gap-2 text-center text-[10px] md:text-xs font-bold text-text-muted mb-2">
                        <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-1 md:gap-2"></div>
                </div>
            </div>
        </div>

        <!-- ================= 所有記錄頁 (Records) ================= -->
        <div id="view-records" class="view-section space-y-5 hidden">
            <div class="neu-card p-5">
                <h2 class="text-lg font-bold mb-5 flex items-center gap-2 text-text-main dark:text-text-darkMain">
                    <div class="p-2 rounded-xl shadow-neu-light dark:shadow-neu-dark text-brand"><i data-lucide="list" class="w-5 h-5"></i></div>
                    歷史記錄
                </h2>
                <div id="all-records-container" class="space-y-6"></div>
            </div>
        </div>

        <!-- ================= 支出頁面 (Expenses) ================= -->
        <div id="view-expenses" class="view-section space-y-5 hidden">
            <div class="neu-card p-5">
                <h2 class="text-lg font-bold mb-5 flex items-center gap-2 text-text-main dark:text-text-darkMain">
                    <div class="p-2 rounded-xl shadow-neu-light dark:shadow-neu-dark text-aux-peach"><i data-lucide="circle-dollar-sign" class="w-5 h-5"></i></div>
                    特別支出
                </h2>
                
                <form id="expense-form" class="mb-8 neu-inset p-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">目的 (例如: 買教材)</label>
                            <input type="text" id="expense-purpose" class="neu-input" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">日期</label>
                            <input type="date" id="expense-date" class="neu-input" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">金額 ($)</label>
                            <input type="number" min="0" id="expense-amount" class="neu-input" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full neu-btn py-2.5 text-sm text-brand">新增支出</button>
                </form>

                <h3 class="text-sm font-bold mb-4 text-text-muted ml-1">支出紀錄</h3>
                <div id="expenses-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- ================= 設定頁 (Settings & Students) ================= -->
        <div id="view-settings" class="view-section space-y-5 hidden">
            <div class="neu-card p-5">
                <h2 class="text-lg font-bold flex items-center gap-2 text-text-main dark:text-text-darkMain mb-5">
                    <div class="p-2 rounded-xl shadow-neu-light dark:shadow-neu-dark text-aux-lavender"><i data-lucide="user-plus" class="w-5 h-5"></i></div>
                    管理學生
                </h2>
                
                <form id="add-student-form" class="mb-8 neu-inset p-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">學生姓名</label>
                            <input type="text" id="new-s-name" class="neu-input" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">年級</label>
                            <select id="new-s-grade" class="neu-input appearance-none">
                                <option>小一</option><option>小二</option><option>小三</option><option>小四</option><option>小五</option><option>小六</option>
                                <option selected>中一</option><option>中二</option><option>中三</option><option>中四</option><option>中五</option><option>中六</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">時薪 ($/hr)</label>
                            <input type="number" min="0" id="new-s-rate" class="neu-input" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">科目</label>
                            <select id="new-s-subject" class="neu-input appearance-none">
                                <option selected>英文</option><option>全科</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">地址簡稱</label>
                            <input type="text" id="new-s-address-short" class="neu-input">
                        </div>
                    </div>
                    <button type="submit" class="w-full neu-btn py-2.5 text-sm text-brand">新增學生</button>
                </form>

                <h3 id="students-count-title" class="text-sm font-bold text-text-muted mb-3 ml-1">現有學生 (0)</h3>
                <div id="students-list" class="space-y-3 mb-8"></div>

                <!-- 系統數值設定 -->
                <div class="pt-6 border-t border-black/5 dark:border-white/5">
                    <h3 class="text-sm font-bold mb-4 text-text-main dark:text-text-darkMain">系統數值設定</h3>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">原目標 ($)</label>
                            <input type="number" id="setting-goal" class="neu-input">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-text-muted mb-1 ml-1">起點金額 ($)</label>
                            <input type="number" id="setting-initial" class="neu-input">
                        </div>
                    </div>
                    <button id="btn-save-sys-settings" class="w-full neu-btn py-2 text-sm">儲存設定</button>
                </div>

                <!-- 備份與恢復 -->
                <div class="pt-6 mt-6 border-t border-black/5 dark:border-white/5">
                    <h3 class="text-sm font-bold mb-4 text-text-main dark:text-text-darkMain">手動備份</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-export" class="neu-btn py-2 text-xs flex items-center justify-center gap-1"><i data-lucide="download" class="w-3 h-3"></i> 匯出</button>
                        <button id="btn-import-trigger" class="neu-btn py-2 text-xs flex items-center justify-center gap-1"><i data-lucide="upload" class="w-3 h-3"></i> 匯入</button>
                        <input type="file" id="file-import" accept=".json" class="hidden">
                    </div>
                </div>

                <!-- Firebase -->
                <div class="pt-6 mt-6 border-t border-black/5 dark:border-white/5">
                    <h3 class="text-sm font-bold mb-2 text-text-main dark:text-text-darkMain">Firebase 同步</h3>
                    <textarea id="firebase-config-input" rows="3" class="neu-input text-[10px] font-mono mb-3" placeholder="貼上 Firebase Config..."></textarea>
                    <button id="btn-save-firebase" class="w-full neu-btn py-2 text-sm">連線</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Sticky Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 w-full bg-bg-light/80 dark:bg-bg-dark/80 backdrop-blur-xl border-t border-white/50 dark:border-white/5 z-50 pb-[env(safe-area-inset-bottom)]">
        <div class="max-w-4xl mx-auto px-6 py-2 flex justify-between items-center">
            
            <!-- Brand Icon -->
            <div class="flex items-center justify-center w-12 h-12 rounded-2xl bg-brand shadow-brand-glow text-white shrink-0 mr-2">
                <i data-lucide="wallet" class="w-6 h-6"></i>
            </div>

            <!-- Tabs -->
            <div class="flex flex-1 justify-between max-w-sm" id="tabs-container">
                <button data-tab="dashboard" class="nav-tab active">
                    <i data-lucide="home" class="w-5 h-5 mb-0.5"></i>
                    <span class="text-[9px] font-bold">主頁</span>
                </button>
                <button data-tab="calendar" class="nav-tab">
                    <i data-lucide="calendar-days" class="w-5 h-5 mb-0.5"></i>
                    <span class="text-[9px] font-bold">月曆</span>
                </button>
                <button data-tab="records" class="nav-tab">
                    <i data-lucide="list" class="w-5 h-5 mb-0.5"></i>
                    <span class="text-[9px] font-bold">記錄</span>
                </button>
                <button data-tab="expenses" class="nav-tab">
                    <i data-lucide="receipt" class="w-5 h-5 mb-0.5"></i>
                    <span class="text-[9px] font-bold">支出</span>
                </button>
                <button data-tab="settings" class="nav-tab">
                    <i data-lucide="settings" class="w-5 h-5 mb-0.5"></i>
                    <span class="text-[9px] font-bold">設定</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-14 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>

    <!-- Application Logic -->
    <script>
        const getTodayString = () => {
            const d = new Date();
            const offset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - offset).toISOString().split('T')[0];
        };

        const state = {
            GOAL: 100000,
            INITIAL_AMOUNT: 57000,
            activeTab: 'dashboard',
            isDarkMode: false,
            sources: [], 
            records: [], 
            expenses: [],
            formData: { date: getTodayString(), sourceId: '', duration: 1.5 },
            chartPeriod: 28,
            chartType: 'weekly',
            currentMonthDate: new Date(),
            editingSourceId: null,
            editForm: {}
        };

        let chartInstance = null;
        let db = null;
        let isFirebaseActive = false;
        let syncTimeout = null;
        let isCloudUpdating = false;

        function loadLocalData() {
            const localData = localStorage.getItem('tutoring_data');
            if (localData) {
                try {
                    const parsed = JSON.parse(localData);
                    state.sources = parsed.sources || [];
                    state.records = parsed.records || [];
                    state.expenses = parsed.expenses || [];
                    if (parsed.GOAL !== undefined) state.GOAL = parsed.GOAL;
                    if (parsed.INITIAL_AMOUNT !== undefined) state.INITIAL_AMOUNT = parsed.INITIAL_AMOUNT;
                } catch (e) {
                    console.error("Local data parse error", e);
                }
            }
        }

        function saveState() {
            localStorage.setItem('tutoring_data', JSON.stringify({
                sources: state.sources,
                records: state.records,
                expenses: state.expenses,
                GOAL: state.GOAL,
                INITIAL_AMOUNT: state.INITIAL_AMOUNT,
                lastUpdated: Date.now()
            }));
            renderAll();
            if (isFirebaseActive && navigator.onLine) {
                syncToCloud();
            } else if (!navigator.onLine) {
                setSyncStatus('offline');
            }
        }

        function setSyncStatus(status) {
            const badge = document.getElementById('sync-badge');
            const dot = document.getElementById('sync-dot');
            const text = document.getElementById('sync-text');

            badge.classList.remove('opacity-0', 'scale-90');
            clearTimeout(syncTimeout);

            if (status === 'connecting') {
                dot.className = 'w-2 h-2 rounded-full bg-aux-peach animate-pulse_fast';
                text.innerText = '連線中';
            } else if (status === 'synced') {
                dot.className = 'w-2 h-2 rounded-full bg-aux-mint';
                text.innerText = '已同步';
                syncTimeout = setTimeout(() => badge.classList.add('opacity-0', 'scale-90'), 5000);
            } else if (status === 'offline') {
                dot.className = 'w-2 h-2 rounded-full bg-brand';
                text.innerText = '離線';
                syncTimeout = setTimeout(() => badge.classList.add('opacity-0', 'scale-90'), 5000);
            }
        }

        function initFirebase(configStr) {
            if (!configStr) {
                setSyncStatus('offline');
                return;
            }
            try {
                let cleanStr = configStr.replace(/(const|let|var)\s+firebaseConfig\s*=\s*/, '').replace(/;/g, '').trim();
                const config = new Function("return " + cleanStr)();

                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                db = firebase.firestore();
                isFirebaseActive = true;
                
                db.collection('appData').doc('tutoring_tracker').onSnapshot((doc) => {
                    if (isCloudUpdating) return; 
                    if (doc.exists) {
                        const data = doc.data();
                        state.sources = data.sources || [];
                        state.records = data.records || [];
                        state.expenses = data.expenses || [];
                        if (data.GOAL !== undefined) state.GOAL = data.GOAL;
                        if (data.INITIAL_AMOUNT !== undefined) state.INITIAL_AMOUNT = data.INITIAL_AMOUNT;
                        
                        localStorage.setItem('tutoring_data', JSON.stringify({
                            sources: state.sources,
                            records: state.records,
                            expenses: state.expenses,
                            GOAL: state.GOAL,
                            INITIAL_AMOUNT: state.INITIAL_AMOUNT,
                            lastUpdated: Date.now()
                        }));
                        renderAll();
                        setSyncStatus('synced');
                    } else {
                        syncToCloud();
                    }
                }, (error) => {
                    console.error("Firestore sync error:", error);
                    showToast('權限不足！', 'error');
                    setSyncStatus('offline');
                });

                setSyncStatus('connecting');
            } catch (e) {
                console.error("Firebase Init Error:", e);
                showToast('Firebase 設定格式錯誤！', 'error');
                setSyncStatus('offline');
            }
        }

        function syncToCloud() {
            if (!db) return;
            setSyncStatus('connecting');
            isCloudUpdating = true;
            
            db.collection('appData').doc('tutoring_tracker').set({
                sources: state.sources,
                records: state.records,
                expenses: state.expenses,
                GOAL: state.GOAL,
                INITIAL_AMOUNT: state.INITIAL_AMOUNT,
                lastUpdated: Date.now()
            }).then(() => {
                setSyncStatus('synced');
                setTimeout(() => { isCloudUpdating = false; }, 500);
            }).catch((error) => {
                console.error("Error writing to cloud:", error);
                setSyncStatus('offline');
                isCloudUpdating = false;
            });
        }

        const formatMoney = (num) => num.toLocaleString();
        const getWeekRange = (dateString) => {
            const d = new Date(dateString);
            const day = d.getDay() || 7; 
            const monday = new Date(d);
            monday.setDate(d.getDate() - day + 1);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            return `${monday.getMonth() + 1}/${monday.getDate()} - ${sunday.getMonth() + 1}/${sunday.getDate()}`;
        };
        
        const getStudentTotalIncome = (sourceId) => {
            return state.records.filter(r => r.sourceId === sourceId).reduce((sum, r) => sum + r.income, 0);
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-bg-light dark:bg-bg-dark text-aux-mint' : 'bg-bg-light dark:bg-bg-dark text-brand';
            const iconName = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `${bgColor} px-4 py-3 rounded-2xl shadow-neu-light dark:shadow-neu-dark border border-white/50 dark:border-white/5 text-sm font-bold flex items-center gap-3 transform transition-all duration-400 -translate-y-10 opacity-0`;
            toast.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i> <span class="text-text-main dark:text-text-darkMain">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            requestAnimationFrame(() => toast.classList.remove('-translate-y-10', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('-translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        function switchTab(newTab) {
            if (state.activeTab === newTab) return;
            state.activeTab = newTab;
            
            document.querySelectorAll('.nav-tab').forEach(btn => {
                if (btn.dataset.tab === state.activeTab) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            document.querySelectorAll('.view-section').forEach(sec => {
                sec.classList.add('hidden');
                sec.classList.remove('card-push-enter');
            });

            const activeSec = document.getElementById(`view-${state.activeTab}`);
            activeSec.classList.remove('hidden');
            // Trigger reflow to restart animation
            void activeSec.offsetWidth;
            activeSec.classList.add('card-push-enter');
            
            renderAll(false); // Render without resetting tabs
        }

        function renderDashboard() {
            const totalEarned = state.records.reduce((sum, r) => sum + r.income, 0);
            const totalExpenses = state.expenses.reduce((sum, e) => sum + e.amount, 0);
            
            const effectiveGoal = state.GOAL + totalExpenses;
            const currentTotal = state.INITIAL_AMOUNT + totalEarned;
            const progressPercentage = Math.min((currentTotal / effectiveGoal) * 100, 100);

            document.getElementById('dash-current-total').innerText = `$${formatMoney(currentTotal)}`;
            document.getElementById('dash-earned-total').innerText = `(+$${formatMoney(totalEarned)})`;
            document.getElementById('dash-goal-text').innerText = `目標: $${formatMoney(effectiveGoal)}`;
            document.getElementById('dash-progress-text').innerText = `${progressPercentage.toFixed(1)}%`;
            document.getElementById('dash-remaining-text').innerText = `尚欠: $${formatMoney(Math.max(0, effectiveGoal - currentTotal))}`;
            document.getElementById('dash-progress-bar').style.width = `${progressPercentage}%`;

            document.getElementById('record-date').value = state.formData.date;
            document.getElementById('record-duration').innerText = state.formData.duration;
            
            const sourceSelect = document.getElementById('record-source');
            sourceSelect.innerHTML = '<option value="" disabled selected>請選擇學生...</option>';
            
            if (state.sources.length === 0) {
                sourceSelect.innerHTML = '<option value="" disabled selected>請先到設定頁新增學生</option>';
            } else {
                let sortedSourceIds = [...new Set(state.records.map(r => r.sourceId))];
                state.sources.forEach(s => { if(!sortedSourceIds.includes(s.id)) sortedSourceIds.push(s.id); });
                
                sortedSourceIds.forEach(id => {
                    const s = state.sources.find(src => src.id === id);
                    if (s) {
                        const totalIncome = getStudentTotalIncome(s.id);
                        const addrShort = s.addressShort || (s.address ? s.address.split(' ')[0] : '無');
                        const option = document.createElement('option');
                        option.value = s.id;
                        option.innerText = `${addrShort} ${s.name} ($${totalIncome}@${s.rate})`;
                        if (state.formData.sourceId === s.id) option.selected = true;
                        sourceSelect.appendChild(option);
                    }
                });
            }

            const previewDiv = document.getElementById('record-preview');
            if (state.formData.sourceId && state.sources.find(src => src.id === state.formData.sourceId)) {
                const s = state.sources.find(src => src.id === state.formData.sourceId);
                document.getElementById('record-preview-amount').innerText = `$${formatMoney(s.rate * state.formData.duration)}`;
                previewDiv.classList.remove('hidden');
            } else {
                previewDiv.classList.add('hidden');
            }

            const tbody = document.getElementById('recent-records-body');
            tbody.innerHTML = '';
            if (state.records.length === 0) {
                tbody.innerHTML = `<div class="p-4 text-center text-xs font-bold text-text-muted neu-inset">尚未有任何記錄</div>`;
            } else {
                state.records.slice(0, 5).forEach(record => {
                    tbody.innerHTML += `
                        <div class="neu-inset p-3 flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-text-muted">${record.date.slice(5)}</span>
                                <span class="text-xs font-bold text-text-main dark:text-text-darkMain">${record.sourceName}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-extrabold text-aux-mint">+$${record.income}</span>
                                <button onclick="deleteRecord(${record.id})" class="p-1.5 text-text-muted hover:text-brand rounded-lg transition-all" title="刪除">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            renderChart();
        }

        function renderChart() {
            const cutoffDate = new Date(getTodayString());
            cutoffDate.setDate(cutoffDate.getDate() - state.chartPeriod);
            const sortedRecords = [...state.records].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // 累積模式不再包含 INITIAL_AMOUNT，從 0 開始計算該期間的累積
            let runningCumulative = 0; 
            const weeklyDataMap = {};

            sortedRecords.forEach(record => {
                const recDate = new Date(record.date);
                if (recDate >= cutoffDate) {
                    const weekLabel = getWeekRange(record.date);
                    if (!weeklyDataMap[weekLabel]) {
                        weeklyDataMap[weekLabel] = { name: weekLabel, income: 0, cumulative: runningCumulative };
                    }
                    weeklyDataMap[weekLabel].income += record.income;
                    runningCumulative += record.income;
                    weeklyDataMap[weekLabel].cumulative = runningCumulative;
                }
            });

            const data = Object.values(weeklyDataMap);
            const labels = data.map(d => d.name);
            const dataset = data.map(d => state.chartType === 'weekly' ? d.income : d.cumulative);

            const btnWeekly = document.getElementById('chart-type-weekly');
            const btnCumulative = document.getElementById('chart-type-cumulative');
            
            if (state.chartType === 'weekly') {
                btnWeekly.className = "px-3 py-1 text-[10px] font-bold rounded-lg shadow-neu-light dark:shadow-neu-dark text-brand bg-bg-light dark:bg-bg-dark transition-all";
                btnCumulative.className = "px-3 py-1 text-[10px] font-bold rounded-lg text-text-muted transition-all";
            } else {
                btnCumulative.className = "px-3 py-1 text-[10px] font-bold rounded-lg shadow-neu-light dark:shadow-neu-dark text-brand bg-bg-light dark:bg-bg-dark transition-all";
                btnWeekly.className = "px-3 py-1 text-[10px] font-bold rounded-lg text-text-muted transition-all";
            }

            const ctx = document.getElementById('incomeChart').getContext('2d');
            const mainColor = state.chartType === 'weekly' ? '#7BC67E' : '#A5B4FC'; // Mint for bar, Lavender for line
            const gridColor = state.isDarkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            const textColor = state.isDarkMode ? '#9CA3AF' : '#9CA3AF';

            if (chartInstance) chartInstance.destroy();

            // 根據模式決定圖表類型 (bar 或 line)
            const chartConfigType = state.chartType === 'weekly' ? 'bar' : 'line';

            chartInstance = new Chart(ctx, {
                type: chartConfigType,
                data: {
                    labels: labels.length ? labels : ['無資料'],
                    datasets: [{
                        label: state.chartType === 'weekly' ? '單週收入' : '期間累積',
                        data: dataset.length ? dataset : [0],
                        backgroundColor: state.chartType === 'weekly' ? mainColor : 'rgba(165, 180, 252, 0.2)',
                        borderColor: mainColor,
                        borderWidth: state.chartType === 'weekly' ? 0 : 3,
                        fill: state.chartType === 'cumulative',
                        tension: 0.4, // 讓折線圖變平滑
                        pointBackgroundColor: state.isDarkMode ? '#1A1B1E' : '#FDFBF7',
                        pointBorderColor: mainColor,
                        pointBorderWidth: 2,
                        pointRadius: state.chartType === 'cumulative' ? 4 : 0,
                        borderRadius: { topLeft: 6, topRight: 6, bottomLeft: 0, bottomRight: 0 },
                        barThickness: 'flex',
                        maxBarThickness: 30
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 800, // 加入流暢轉場動畫
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: state.isDarkMode ? '#1A1B1E' : '#FDFBF7',
                            titleColor: state.isDarkMode ? '#E5E7EB' : '#4A4A4A',
                            bodyColor: mainColor,
                            borderColor: state.isDarkMode ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)',
                            borderWidth: 1,
                            padding: 10,
                            cornerRadius: 12,
                            displayColors: false,
                            callbacks: { label: (ctx) => `$${formatMoney(ctx.raw)}` }
                        }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: textColor, font: { family: 'Inter', size: 10, weight: '600' } } },
                        y: { 
                            grid: { color: gridColor, drawBorder: false }, 
                            ticks: { color: textColor, font: { family: 'Inter', size: 10, weight: '600' }, callback: (val) => `$${val}` },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function renderCalendar() {
            const year = state.currentMonthDate.getFullYear();
            const month = state.currentMonthDate.getMonth();
            document.getElementById('cal-month-title').innerText = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            let startingDay = firstDay.getDay() - 1;
            if (startingDay === -1) startingDay = 6;
            
            const daysInMonth = lastDay.getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            let monthTotal = 0;
            const todayStr = getTodayString();

            // Empty slots
            for (let i = 0; i < startingDay; i++) {
                grid.innerHTML += `<div class="min-h-[50px]"></div>`;
            }

            // Days
            for (let i = 1; i <= daysInMonth; i++) {
                const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayRecords = state.records.filter(r => r.date === dStr);
                const dayIncome = dayRecords.reduce((sum, r) => sum + r.income, 0);
                monthTotal += dayIncome;

                const isToday = dStr === todayStr;
                const hasIncome = dayIncome > 0;
                
                // Styling logic based on Soft UI
                let baseClasses = "neu-inset p-1.5 min-h-[50px] flex flex-col justify-between transition-all";
                let dateColor = "text-text-muted";
                let incomeHtml = `<span class="text-text-muted/30 text-[10px] font-bold">-</span>`;

                if (isToday) {
                    baseClasses += " ring-1 ring-brand/50 shadow-brand-glow";
                    dateColor = "text-brand";
                }
                
                if (hasIncome) {
                    // Give a soft mint tint to the background if there's income
                    baseClasses += " bg-aux-mint/10 dark:bg-aux-mint/5";
                    incomeHtml = `<span class="text-[10px] sm:text-xs font-extrabold text-aux-mint tracking-tighter leading-none">$${dayIncome}</span>`;
                }

                grid.innerHTML += `
                    <div class="${baseClasses}">
                        <span class="text-[10px] font-bold ${dateColor}">${i}</span>
                        <div class="flex-1 flex items-end justify-center pb-0.5">
                            ${incomeHtml}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('cal-month-total').innerText = `$${formatMoney(monthTotal)}`;
        }

        function renderRecords() {
            const container = document.getElementById('all-records-container');
            if (state.records.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-sm font-bold text-text-muted neu-inset">目前沒有任何記錄。</div>`;
                return;
            }

            const groups = {};
            state.records.forEach(record => {
                const d = new Date(record.date);
                const monthKey = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
                const weekKey = getWeekRange(record.date);
                if (!groups[monthKey]) groups[monthKey] = {};
                if (!groups[monthKey][weekKey]) groups[monthKey][weekKey] = [];
                groups[monthKey][weekKey].push(record);
            });

            let html = '';
            Object.entries(groups).forEach(([month, weeks]) => {
                html += `<div class="space-y-3">
                    <h3 class="text-base font-extrabold text-text-main dark:text-text-darkMain pl-1">${month}</h3>
                    <div class="space-y-4">`;
                
                Object.entries(weeks).forEach(([week, weekRecords]) => {
                    const weekTotal = weekRecords.reduce((sum, r) => sum + r.income, 0);
                    html += `
                        <div class="neu-inset overflow-hidden">
                            <div class="bg-black/5 dark:bg-white/5 px-4 py-2 text-[10px] font-bold flex justify-between items-center">
                                <span class="text-text-muted">${week}</span>
                                <span class="text-aux-mint bg-aux-mint/10 px-2 py-0.5 rounded-md">週收入: $${weekTotal}</span>
                            </div>
                            <div class="flex flex-col p-2 space-y-1">
                    `;
                    weekRecords.forEach((record) => {
                        html += `
                            <div class="flex items-center justify-between p-2 rounded-xl hover:bg-black/5 dark:hover:bg-white/5 transition-colors group">
                                <div class="flex flex-col">
                                    <span class="text-[10px] font-bold text-text-muted">${record.date}</span>
                                    <span class="text-xs font-bold text-text-main dark:text-text-darkMain">${record.sourceName}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="text-sm font-extrabold text-aux-mint">+$${record.income}</span>
                                    <button onclick="deleteRecord(${record.id})" class="p-1.5 text-text-muted hover:text-brand rounded-lg transition-all" title="刪除記錄">
                                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function renderExpenses() {
            const list = document.getElementById('expenses-list');
            if (state.expenses.length === 0) {
                list.innerHTML = `<div class="p-6 text-center text-sm font-bold text-text-muted neu-inset">尚未有任何支出紀錄。</div>`;
                return;
            }
            
            const sortedExpenses = [...state.expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
            const maxExpense = Math.max(...state.expenses.map(e => e.amount), 1);
            
            let html = '';
            sortedExpenses.forEach(exp => {
                const percentage = (exp.amount / maxExpense) * 100;
                html += `
                    <div class="relative overflow-hidden flex items-center justify-between p-3 neu-inset group">
                        <!-- Soft Peach Progress Background -->
                        <div class="absolute left-0 top-0 bottom-0 bg-aux-peach/20 transition-all duration-500 rounded-l-xl" style="width: ${percentage}%"></div>
                        
                        <div class="relative z-10 flex flex-col">
                            <span class="text-[10px] font-bold text-text-muted">${exp.date}</span>
                            <span class="text-xs font-bold text-text-main dark:text-text-darkMain">${exp.purpose}</span>
                        </div>
                        <div class="relative z-10 flex items-center gap-3">
                            <span class="text-sm font-extrabold text-aux-peach">-$${formatMoney(exp.amount)}</span>
                            <button onclick="deleteExpense(${exp.id})" class="p-1.5 text-text-muted hover:text-brand rounded-lg transition-all" title="刪除紀錄">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
            
            if(!document.getElementById('expense-date').value) {
                document.getElementById('expense-date').value = getTodayString();
            }
        }

        function renderSettings() {
            document.getElementById('students-count-title').innerText = `現有學生 (${state.sources.length})`;
            const list = document.getElementById('students-list');
            list.innerHTML = '';

            if (state.sources.length === 0) {
                list.innerHTML = `<div class="p-6 text-center text-sm font-bold text-text-muted neu-inset">尚未新增任何學生。</div>`;
            } else {
                state.sources.forEach(source => {
                    if (state.editingSourceId === source.id) {
                        list.innerHTML += `
                            <div class="neu-inset p-4 space-y-3">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="text" id="edit-name" value="${state.editForm.name}" class="neu-input py-1.5 text-xs">
                                    <select id="edit-grade" class="neu-input py-1.5 text-xs appearance-none">
                                        ${['小一','小二','小三','小四','小五','小六','中一','中二','中三','中四','中五','中六'].map(g => `<option ${state.editForm.grade===g?'selected':''}>${g}</option>`).join('')}
                                    </select>
                                    <select id="edit-subject" class="neu-input py-1.5 text-xs appearance-none">
                                        ${['英文','全科'].map(s => `<option ${state.editForm.subject===s?'selected':''}>${s}</option>`).join('')}
                                    </select>
                                    <input type="number" id="edit-rate" value="${state.editForm.rate}" class="neu-input py-1.5 text-xs">
                                    <input type="text" id="edit-address-short" value="${state.editForm.addressShort || ''}" placeholder="地址簡稱" class="col-span-2 neu-input py-1.5 text-xs">
                                </div>
                                <div class="flex justify-end gap-2 mt-2">
                                    <button onclick="cancelEdit()" class="px-3 py-1.5 text-xs font-bold text-text-muted neu-btn">取消</button>
                                    <button onclick="saveEdit()" class="px-4 py-1.5 text-xs neu-btn-primary">儲存</button>
                                </div>
                            </div>
                        `;
                    } else {
                        list.innerHTML += `
                            <div class="neu-inset p-3 relative flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-aux-lavender/20 text-aux-lavender flex items-center justify-center font-extrabold text-base shrink-0 shadow-neu-inset-light dark:shadow-neu-inset-dark">
                                    ${source.name.charAt(0)}
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between items-start">
                                        <h4 class="font-bold text-sm text-text-main dark:text-text-darkMain">${source.name}</h4>
                                        <span class="text-sm font-extrabold text-brand">$${source.rate}<span class="text-[9px] text-text-muted font-normal">/hr</span></span>
                                    </div>
                                    <p class="text-[10px] font-bold text-text-muted">${source.grade} • ${source.subject} • ${source.addressShort || '無地址'}</p>
                                </div>
                                <div class="flex flex-col gap-1 ml-1">
                                    <button onclick="startEdit('${source.id}')" class="p-1.5 text-text-muted hover:text-aux-lavender rounded-lg"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="deleteSource('${source.id}')" class="p-1.5 text-text-muted hover:text-brand rounded-lg"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                </div>
                            </div>
                        `;
                    }
                });
            }

            document.getElementById('setting-goal').value = state.GOAL;
            document.getElementById('setting-initial').value = state.INITIAL_AMOUNT;
        }

        function renderAll(updateTabs = true) {
            if(updateTabs) {
                document.querySelectorAll('.nav-tab').forEach(btn => {
                    if (btn.dataset.tab === state.activeTab) btn.classList.add('active');
                    else btn.classList.remove('active');
                });
                document.querySelectorAll('.view-section').forEach(sec => sec.classList.add('hidden'));
                document.getElementById(`view-${state.activeTab}`).classList.remove('hidden');
            }
            
            renderDashboard();
            renderCalendar();
            renderRecords();
            renderExpenses();
            renderSettings();
            lucide.createIcons();
        }

        window.deleteRecord = function(id) {
            if (confirm('確定要刪除這筆記錄嗎？總收入將會相應扣除。')) {
                state.records = state.records.filter(r => r.id !== id);
                saveState();
            }
        };

        window.deleteExpense = function(id) {
            if (confirm('確定要刪除這筆支出紀錄嗎？')) {
                state.expenses = state.expenses.filter(e => e.id !== id);
                saveState();
            }
        };

        window.deleteSource = function(id) {
            if (confirm('確定要刪除這個學生嗎？(不會影響過往記錄)')) {
                state.sources = state.sources.filter(s => s.id !== id);
                if (state.formData.sourceId === id) state.formData.sourceId = '';
                saveState();
            }
        };

        window.startEdit = function(id) {
            const source = state.sources.find(s => s.id === id);
            state.editingSourceId = id;
            state.editForm = { ...source };
            renderSettings();
            lucide.createIcons();
        };

        window.cancelEdit = function() {
            state.editingSourceId = null;
            renderSettings();
            lucide.createIcons();
        };

        window.saveEdit = function() {
            const name = document.getElementById('edit-name').value;
            const rate = parseFloat(document.getElementById('edit-rate').value);
            if (!name || isNaN(rate)) return;

            state.sources = state.sources.map(s => s.id === state.editingSourceId ? {
                ...s, name, grade: document.getElementById('edit-grade').value,
                subject: document.getElementById('edit-subject').value, rate,
                addressShort: document.getElementById('edit-address-short').value
            } : s);
            
            state.editingSourceId = null;
            saveState();
        };

        function initEvents() {
            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    switchTab(e.currentTarget.dataset.tab);
                });
            });

            document.getElementById('record-date').addEventListener('change', (e) => { state.formData.date = e.target.value; });
            document.getElementById('record-source').addEventListener('change', (e) => { state.formData.sourceId = e.target.value; renderDashboard(); });
            document.getElementById('btn-duration-minus').addEventListener('click', () => { state.formData.duration = Math.max(0.5, state.formData.duration - 0.5); renderDashboard(); });
            document.getElementById('btn-duration-plus').addEventListener('click', () => { state.formData.duration += 0.5; renderDashboard(); });
            
            document.getElementById('record-form').addEventListener('submit', (e) => {
                e.preventDefault();
                if (!state.formData.sourceId) return showToast('請先選擇學生！', 'error');
                const s = state.sources.find(src => src.id === state.formData.sourceId);
                const newRecord = {
                    id: Date.now(), date: state.formData.date, sourceId: s.id,
                    sourceName: `${s.name} (${s.grade})`, duration: state.formData.duration,
                    income: s.rate * state.formData.duration
                };
                state.records.unshift(newRecord);
                state.records.sort((a, b) => new Date(b.date) - new Date(a.date));
                state.formData.sourceId = '';
                state.formData.duration = 1.5;
                saveState();
                showToast('記錄已成功儲存！');
            });

            document.getElementById('expense-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const newExpense = {
                    id: Date.now(),
                    date: document.getElementById('expense-date').value,
                    purpose: document.getElementById('expense-purpose').value,
                    amount: parseFloat(document.getElementById('expense-amount').value)
                };
                state.expenses.push(newExpense);
                e.target.reset();
                document.getElementById('expense-date').value = getTodayString();
                saveState();
                showToast('支出紀錄已新增！');
            });

            document.getElementById('chart-type-weekly').addEventListener('click', () => { state.chartType = 'weekly'; renderDashboard(); });
            document.getElementById('chart-type-cumulative').addEventListener('click', () => { state.chartType = 'cumulative'; renderDashboard(); });
            
            // 時間段切換按鈕事件
            document.querySelectorAll('.chart-period-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // 更新狀態
                    state.chartPeriod = parseInt(e.target.dataset.days);
                    
                    // 更新按鈕 UI (Soft UI 凹陷效果)
                    document.querySelectorAll('.chart-period-btn').forEach(b => {
                        b.className = "chart-period-btn flex-1 neu-btn py-1.5 text-[10px] transition-all";
                    });
                    e.target.className = "chart-period-btn flex-1 neu-btn py-1.5 text-[10px] text-brand shadow-neu-inset-light dark:shadow-neu-inset-dark bg-bg-light dark:bg-bg-dark transition-all";
                    
                    // 重新渲染圖表 (帶有動畫)
                    renderChart();
                });
            });

            document.getElementById('cal-prev').addEventListener('click', () => { state.currentMonthDate.setMonth(state.currentMonthDate.getMonth() - 1); renderCalendar(); lucide.createIcons(); });
            document.getElementById('cal-next').addEventListener('click', () => { state.currentMonthDate.setMonth(state.currentMonthDate.getMonth() + 1); renderCalendar(); lucide.createIcons(); });

            document.getElementById('add-student-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const newSource = {
                    id: `s_${Date.now()}`, name: document.getElementById('new-s-name').value,
                    grade: document.getElementById('new-s-grade').value, subject: document.getElementById('new-s-subject').value,
                    rate: parseFloat(document.getElementById('new-s-rate').value),
                    addressShort: document.getElementById('new-s-address-short').value
                };
                state.sources.push(newSource);
                e.target.reset();
                saveState();
                showToast('學生資料已新增！');
            });

            document.getElementById('btn-save-sys-settings').addEventListener('click', () => {
                const newGoal = parseFloat(document.getElementById('setting-goal').value);
                const newInitial = parseFloat(document.getElementById('setting-initial').value);
                
                if (!isNaN(newGoal) && newGoal >= 0) state.GOAL = newGoal;
                if (!isNaN(newInitial) && newInitial >= 0) state.INITIAL_AMOUNT = newInitial;
                
                saveState();
                showToast('系統數值設定已儲存！');
            });

            document.getElementById('theme-toggle').addEventListener('click', () => {
                state.isDarkMode = !state.isDarkMode;
                if (state.isDarkMode) {
                    document.documentElement.classList.add('dark');
                    document.getElementById('theme-icon').setAttribute('data-lucide', 'sun');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.getElementById('theme-icon').setAttribute('data-lucide', 'moon');
                }
                renderAll();
            });

            document.getElementById('btn-export').addEventListener('click', () => {
                const jsonStr = JSON.stringify({ 
                    sources: state.sources, records: state.records, expenses: state.expenses,
                    GOAL: state.GOAL, INITIAL_AMOUNT: state.INITIAL_AMOUNT
                }, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const d = new Date();
                const filename = `tutoring_backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
                const a = document.createElement('a'); a.href = url; a.download = filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                showToast(`資料已匯出至 ${filename}`);
            });

            document.getElementById('btn-import-trigger').addEventListener('click', () => document.getElementById('file-import').click());
            document.getElementById('file-import').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.sources && parsed.records) {
                            state.sources = parsed.sources;
                            state.records = parsed.records;
                            if (parsed.expenses) state.expenses = parsed.expenses;
                            if (parsed.GOAL !== undefined) state.GOAL = parsed.GOAL;
                            if (parsed.INITIAL_AMOUNT !== undefined) state.INITIAL_AMOUNT = parsed.INITIAL_AMOUNT;
                            saveState();
                            showToast('進度恢復成功！');
                        } else showToast('檔案格式不正確！', 'error');
                    } catch (error) { showToast('讀取失敗！', 'error'); }
                    e.target.value = '';
                };
                reader.readAsText(file);
            });

            document.getElementById('btn-save-firebase').addEventListener('click', () => {
                const configStr = document.getElementById('firebase-config-input').value.trim();
                if (configStr) {
                    localStorage.setItem('firebase_config', configStr);
                    initFirebase(configStr);
                    showToast('Firebase 設定已儲存！');
                } else {
                    localStorage.removeItem('firebase_config');
                    isFirebaseActive = false;
                    db = null;
                    setSyncStatus('offline');
                    showToast('已清除 Firebase 設定。');
                }
            });

            window.addEventListener('online', () => { if(isFirebaseActive) syncToCloud(); });
            window.addEventListener('offline', () => setSyncStatus('offline'));
        }

        loadLocalData(); 
        initEvents();    
        renderAll();     

        const savedConfig = localStorage.getItem('firebase_config');
        if (savedConfig) {
            document.getElementById('firebase-config-input').value = savedConfig;
            initFirebase(savedConfig);
        } else {
            setSyncStatus('offline'); 
        }

    </script>
</body>
</html>
